name: 问题与 BUG 反馈
description: 反馈 OStatus 在当前支持环境下的问题
labels: [bug]
title: "[BUG] "
body:
  - type: markdown
    attributes:
      value: |
        ### 请先确认环境范围

        OStatus 当前仅维护 ColorOS 16 / Android 16（API 36）与 modern libxposed API 101 / LSPosed 环境。
        旧版 Android、旧版 ColorOS、legacy Xposed API、非官方系统修改版不在当前维护范围内。

        发生异常、崩溃、闪退或功能性问题时，请提供包含 `ColorOSNotifyIcon` 的 LSPosed 日志。
  - type: input
    attributes:
      label: 模块版本
      description: 请填写当前使用的模块完整版本号，例如：1.103-r2
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 系统类型
      description: 当前仅维护 ColorOS 16。
      options:
        - ColorOS
    validations:
      required: true
  - type: input
    attributes:
      label: 系统版本
      description: 请填写完整系统版本号，例如：ColorOS 16.x / 机型固件版本
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Android 版本
      options:
        - 16
    validations:
      required: true
  - type: input
    attributes:
      label: LSPosed / Xposed 框架版本
      description: 请填写当前使用的框架名称、版本号以及 API 版本，例如：LSPosed xxx / API 101
    validations:
      required: true
  - type: input
    attributes:
      label: 与系统界面(系统 UI)同作用域的 Xposed 模块
      description: |
        本模块作用域包含 system 与 com.android.systemui。为排除冲突，请填写同作用域启用的其他模块。
        若没有，请直接在下方填写“无”。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现步骤与现象
      description: 请描述触发场景、预期结果、实际结果，以及重启 SystemUI 或重启手机后是否仍可复现。
    validations:
      required: true
  - type: textarea
    attributes:
      label: LSPosed 日志
      description: LSPosed 可在日志管理中查看并筛选包含 `ColorOSNotifyIcon` 的日志。
      value: |
        <details><summary>展开查看</summary><pre><code>

        (此处粘贴问题 Log)

        </code></pre></details>
        <!-- 提交时请将括号内容包括括号全部删除，粘贴你复制的日志，不要破坏代码格式 -->
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: 确认一下你提交的信息
      description: |
        为了确保 issue 可复现、可定位，请在提交前确认以下内容。
      options:
        - label: 我确认正在使用 ColorOS 16 / Android 16 与 modern libxposed API 101 环境
          required: true
        - label: 我已经提供可用于定位问题的日志或复现信息
          required: true
